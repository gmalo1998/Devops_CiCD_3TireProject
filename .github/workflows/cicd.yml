name: ChatApp CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'helm/**'

permissions:
  contents: write

env:
  IMAGE_TAG: ${{ github.sha }}
  FRONTEND_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/hellochat-frontend
  BACKEND_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/hellochat-backend

jobs:

  build-test-push:

    runs-on: ubuntu-latest

    steps:

      # ---------------------------
      # Checkout
      # ---------------------------
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------
      # Setup Node
      # ---------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # ---------------------------
      # Install Dependencies
      # ---------------------------
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      # ---------------------------
      # Run Tests
      # ---------------------------
      - name: Run Frontend Tests
        working-directory: frontend
        run: npm test

      - name: Run Backend Tests
        working-directory: backend
        run: npm test

      # ---------------------------
      # SonarCloud
      # ---------------------------
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBETOKEN }}
        run: |
          npx sonar-scanner \
            -Dsonar.organization=gmalo1998 \
            -Dsonar.projectKey=Devops_CiCD_3TireProject \
            -Dsonar.sources=. \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=$SONAR_TOKEN

      # ---------------------------
      # OWASP
      # ---------------------------
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: chatapp
          path: .
          format: HTML
          out: reports

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: reports

      # ---------------------------
      # Docker Login
      # ---------------------------
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASS }}

      # ---------------------------
      # Frontend
      # ---------------------------
      - name: Build Frontend Image
        run: |
          docker build \
          -t $FRONTEND_IMAGE:${IMAGE_TAG} \
          -t $FRONTEND_IMAGE:latest \
          ./frontend

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Push Frontend Image
        run: |
          docker push $FRONTEND_IMAGE:${IMAGE_TAG}
          docker push $FRONTEND_IMAGE:latest

      # ---------------------------
      # Backend
      # ---------------------------
      - name: Build Backend Image
        run: |
          docker build \
          -t $BACKEND_IMAGE:${IMAGE_TAG} \
          -t $BACKEND_IMAGE:latest \
          ./backend

      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Push Backend Image
        run: |
          docker push $BACKEND_IMAGE:${IMAGE_TAG}
          docker push $BACKEND_IMAGE:latest

      # ---------------------------
      # Helm
      # ---------------------------
      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install yq
        run: |
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
          -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Helm Lint
        run: |
          helm lint helm/hellochat \
          -f helm/hellochat/values-prod.yaml

      - name: Helm Template
        run: |
          helm template hellochat \
          helm/hellochat \
          -f helm/hellochat/values-prod.yaml

      # ---------------------------
      # Update Helm Tags
      # ---------------------------
      - name: Update Helm Image Tag
        run: |
          yq e -i '
          .frontend.image.tag = strenv(IMAGE_TAG) |
          .backend.image.tag = strenv(IMAGE_TAG)
          ' helm/hellochat/values-prod.yaml

      - name: Commit Helm Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
          "41898282+github-actions[bot]@users.noreply.github.com"

          git add helm/hellochat/values-prod.yaml

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update image tag ${IMAGE_TAG}"
            git push \
            https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          fi

      # ---------------------------
      # Email Success
      # ---------------------------
      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: GitHub Actions
          subject: "✅ Deployment Successful"

          body: |
            CI/CD Pipeline completed successfully.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

      # ---------------------------
      # Email Failure
      # ---------------------------
      - name: Send Failure Email
        if: always() && failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: GitHub Actions
          subject: "❌ Deployment Failed"

          body: |
            CI/CD Pipeline failed.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}