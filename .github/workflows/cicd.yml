name: ChatApp CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

 build:

   runs-on: ubuntu-latest

   steps:

   - name: Checkout
     uses: actions/checkout@v4

   - name: Setup Node
     uses: actions/setup-node@v4
     with:
       node-version: 20

   - name: Install Frontend
     run: |
       cd frontend
       npm install

   - name: Install Backend
     run: |
       cd backend
       npm install

   - name: Success
     run: echo "Build Started"
