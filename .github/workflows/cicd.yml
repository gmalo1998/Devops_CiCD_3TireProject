name: ChatApp CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'helm/**'

permissions:
  contents: write

env:
  IMAGE_TAG: ${{ github.sha }}
  FRONTEND_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/hellochat-frontend
  BACKEND_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/hellochat-backend

jobs:

  build-test-push:

    runs-on: ubuntu-latest

    steps:

# =====================================================
# CHECKOUT
# =====================================================

    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

# =====================================================
# NODE
# =====================================================

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24

# =====================================================
# FORCE CLEAN INSTALL
# =====================================================

    - name: Clean Frontend
      run: |
        rm -rf frontend/node_modules
        rm -f frontend/package-lock.json

    - name: Clean Backend
      run: |
        rm -rf backend/node_modules
        rm -f backend/package-lock.json

    - name: Install Frontend
      working-directory: frontend
      run: |
        npm install
        npm audit fix || true

    - name: Install Backend
      working-directory: backend
      run: |
        npm install
        npm install undici@6.27.0
        npm audit fix || true

# =====================================================
# VERIFY UNDICI
# =====================================================

    - name: Verify Backend Packages
      working-directory: backend
      run: |
        npm ls undici || true

# =====================================================
# TEST
# =====================================================

    - name: Frontend Tests
      working-directory: frontend
      run: |
        npm run test -- --run

    - name: Backend Tests
      working-directory: backend
      run: |
        npm test

# =====================================================
# SONAR
# =====================================================

    - name: SonarCloud
      env:
        SONAR_TOKEN: ${{ secrets.SONARQUBETOKEN }}
      run: |
        npx sonar-scanner \
        -Dsonar.organization=gmalo1998 \
        -Dsonar.projectKey=Devops_CiCD_3TireProject \
        -Dsonar.sources=. \
        -Dsonar.host.url=https://sonarcloud.io \
        -Dsonar.login=$SONAR_TOKEN

# =====================================================
# OWASP
# =====================================================

    - name: Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: chatapp
        path: .
        format: HTML
        out: reports

# =====================================================
# DOCKER LOGIN
# =====================================================

    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASS }}

# =====================================================
# BUILD FRONTEND
# =====================================================

    - name: Build Frontend
      run: |
        docker builder prune -af

        docker build \
        --no-cache \
        --pull \
        -t $FRONTEND_IMAGE:${IMAGE_TAG} \
        -t $FRONTEND_IMAGE:latest \
        ./frontend

    - name: Verify Frontend
      run: |
        docker run --rm \
        $FRONTEND_IMAGE:${IMAGE_TAG} \
        nginx -v

    - name: Scan Frontend
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
        format: table
        severity: HIGH,CRITICAL
        ignore-unfixed: true
        exit-code: 1

    - name: Push Frontend
      run: |
        docker push $FRONTEND_IMAGE:${IMAGE_TAG}
        docker push $FRONTEND_IMAGE:latest

# =====================================================
# BUILD BACKEND
# =====================================================

    - name: Build Backend
      run: |

        docker builder prune -af

        docker build \
        --pull \
        --no-cache \
        -t $BACKEND_IMAGE:${IMAGE_TAG} \
        -t $BACKEND_IMAGE:latest \
        ./backend

    - name: Verify Backend
      run: |

        docker run --rm \
        $BACKEND_IMAGE:${IMAGE_TAG} \
        node -v

        docker run --rm \
        $BACKEND_IMAGE:${IMAGE_TAG} \
        npm ls undici

# =====================================================
# REMOVE OLD IMAGE
# =====================================================

    - name: Remove Existing DockerHub Image
      run: |
        docker rmi \
        $BACKEND_IMAGE:latest || true

# =====================================================
# TRIVY
# =====================================================

    - name: Scan Backend
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
        format: table
        severity: HIGH,CRITICAL
        ignore-unfixed: true
        exit-code: 1

# =====================================================
# PUSH
# =====================================================

    - name: Push Backend
      run: |
        docker push $BACKEND_IMAGE:${IMAGE_TAG}
        docker push $BACKEND_IMAGE:latest

# =====================================================
# CLEANUP
# =====================================================

    - name: Cleanup
      if: always()
      run: |
        docker system prune -af