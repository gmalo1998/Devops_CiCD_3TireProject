name: ChatApp CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'helm/**'

permissions:
  contents: write

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ==========================
  # JOB 1: Test & Scan Code
  # ==========================
  code-quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Frontend Checks (Install & Test)
        working-directory: frontend
        run: |
          npm ci
          npm audit || true
          npm run test -- --run

      - name: Backend Checks (Install & Test)
        working-directory: backend
        run: |
          npm ci
          npm audit || true
          npm test

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBETOKEN }}
        run: |
          npx sonar-scanner \
            -Dsonar.organization=gmalo1998 \
            -Dsonar.projectKey=Devops_CiCD_3TireProject \
            -Dsonar.sources=. \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=$SONAR_TOKEN

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: chatapp
          path: .
          format: HTML
          out: reports

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: reports

  # ==========================
  # JOB 2: Build & Push Frontend (Calls Reusable Workflow)
  # ==========================
  build-push-frontend:
    needs: code-quality-and-tests
    uses: ./.github/workflows/template-docker-build.yml
    with:
      working_directory: frontend
      image_name: hellochat-frontend
      image_tag: ${{ github.sha }}
    secrets:
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_PASS: ${{ secrets.DOCKER_HUB_PASS }}

  # ==========================
  # JOB 3: Build & Push Backend (Calls Reusable Workflow)
  # ==========================
  build-push-backend:
    needs: code-quality-and-tests
    uses: ./.github/workflows/template-docker-build.yml
    with:
      working_directory: backend
      image_name: hellochat-backend
      image_tag: ${{ github.sha }}
    secrets:
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_PASS: ${{ secrets.DOCKER_HUB_PASS }}

  # ==========================
  # JOB 4: Update Helm
  # ==========================
  update-helm:
    needs: [build-push-frontend, build-push-backend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Update Helm Image Tag
        run: |
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          yq e -i '
            .frontend.image.tag = strenv(IMAGE_TAG) |
            .backend.image.tag = strenv(IMAGE_TAG)
          ' helm/hellochat/values-prod.yaml

      - name: Commit Helm Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm/hellochat/values-prod.yaml
          if ! git diff --cached --quiet; then
            git commit -m "Update image tag ${IMAGE_TAG}"
            git push https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          fi

  # ==========================
  # JOB 5: Notifications
  # ==========================
  notify:
    needs: update-helm
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Notification Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: GitHub Actions
          subject: "${{ needs.update-helm.result == 'success' && '✅ Deployment Successful' || '❌ Deployment Failed' }}"
          body: |
            CI/CD finished with status: ${{ needs.update-helm.result }}
            Repo: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}