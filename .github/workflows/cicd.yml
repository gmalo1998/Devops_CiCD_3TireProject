name: ChatApp CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend
        run: |
          cd frontend
          npm install

      - name: Install Backend
        run: |
          cd backend
          npm install

      - name: Success
        run: echo "Build Started"

      - name: Frontend Tests
        run: |
          cd frontend
          npm test

      - name: Backend Tests
        run: |
          cd backend
          npm test

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          npx sonar-scanner \
            -Dsonar.host.url=http://192.168.0.78:9000 \
            -Dsonar.login=$SONAR_TOKEN