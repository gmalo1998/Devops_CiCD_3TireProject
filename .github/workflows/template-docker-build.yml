name: Docker Build & Scan Template

on:
  workflow_call:
    inputs:
      working_directory:
        description: 'Directory containing the Dockerfile'
        required: true
        type: string
      image_name:
        description: 'Name of the Docker image'
        required: true
        type: string
      image_tag:
        description: 'Tag for the Docker image'
        required: true
        type: string
    secrets:
      DOCKER_HUB_USERNAME:
        required: true
      DOCKER_HUB_PASS:
        required: true

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Setup Docker Buildx for Caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASS }}

      # 2. Build and Load (Do not push yet, use GHA Cache)
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ inputs.working_directory }}
          load: true # Keep local for Trivy
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/${{ inputs.image_name }}:${{ inputs.image_tag }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/${{ inputs.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 3. Security Scan
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ inputs.image_name }}:${{ inputs.image_tag }}
          format: 'table'
          exit-code: '1' # Hard fail on vulnerabilities
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # 4. Push only if secure
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/${{ inputs.image_name }}:${{ inputs.image_tag }}
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/${{ inputs.image_name }}:latest