apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hellochat
  namespace: argocd

spec:
  project: default
  source:
    repoURL: https://github.com/gmalo1998/Devops_CiCD_3TireProject
    targetRevision: main
    path: helm/hellochat
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: hellochat-production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true